<!DOCTYPE html>
<html lang="th">
    <body>
            <form>
                <div>
                <h1>🛒 สั่งซื้อเก้าอี้ ErgoCode Premium</h1>
                <label>เลือกสีของเก้าอี้:</label>
                    <select>
                            <option>Midnight Black</option>
                            <option>Space Gray</option>
                            <option>Ocean Blue</option>
                    </select>
                    <br><br>
                </div>

                <div>
                <label>วัสดุของล้อ:</label>
                
                    <input type="radio" name="wheel" value="pu"> ล้อ PU (เงียบกริบ)
                    <input type="radio" name="wheel" value="nylon"> ล้อ Nylon (ทนทานพิเศษ)
                    <br><br>
                </div>

                <div>
                    <label>ชื่อผู้รับ:</label>
                    <input type="text" placeholder="ชื่อ-นามสกุล">
                    <br><br>
                </div>

                <div>
                    <label>ที่อยู่จัดสัง:</label><br>
                    <textarea rows="4" cols="30" placeholder="บ้านเลขที่,ถนน,แขวง..."></textarea>
                    <br><br>
                </div>

                <div>
                    <input type="radio" name="pay" value="transfer"> โอนเงิน
                    <input type="radio" name="pay" value="credit"> บัตรเครดิต
                    <br><br>
                </div>

                <div>
                    <button type="sunmit">ยืนยันการสั่งซื้อ</button>
                </div>

            </form>
    </body>
</html>
